<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Aztec Jungle Puzzle</title>
</head>
<body class="placement-loading">
  <main>
    <section class="board" aria-label="Puzzle board">
      <div class="slots" aria-label="Puzzle slots">
        <div class="slot" data-position="KUBAZAN"></div>
        <div class="slot" data-position="NANGNANG"></div>
        <div class="slot" data-position="IJIN"></div>
        <div class="slot" data-position="WONGO"></div>
        <div class="slot" data-position="MOA"></div>
        <div class="slot" data-position="UNKH"></div>
        <div class="slot" data-position="PAPAZOTL"></div>
        <div class="slot" data-position="SHAGAMBI"></div>
        <div class="slot" data-position="OBOLAKA"></div>
      </div>
      <div class="numeral-panel" aria-hidden="true">
        <div class="numeral-target numeral-right numeral-right-1" data-value="13"></div>
        <div class="numeral-target numeral-right numeral-right-2" data-value="15"></div>
        <div class="numeral-target numeral-right numeral-right-3" data-value="17"></div>
        <div class="numeral-target numeral-bottom numeral-bottom-1" data-value="14"></div>
        <div class="numeral-target numeral-bottom numeral-bottom-2" data-value="18"></div>
        <div class="numeral-target numeral-bottom numeral-bottom-3" data-value="13"></div>
      </div>
    </section>

    <section class="bank" aria-label="Tile bank">
      <div class="tile" data-position="KUBAZAN" aria-label="Tile KUBAZAN">KUBAZAN</div>
      <div class="tile" data-position="NANGNANG" aria-label="Tile NANGNANG">NANGNANG</div>
      <div class="tile" data-position="IJIN" aria-label="Tile IJIN">IJIN</div>
      <div class="tile" data-position="WONGO" aria-label="Tile WONGO">WONGO</div>
      <div class="tile" data-position="MOA" aria-label="Tile MOA">MOA</div>
      <div class="tile" data-position="UNKH" aria-label="Tile UNKH">UNKH</div>
      <div class="tile" data-position="PAPAZOTL" aria-label="Tile PAPAZOTL">PAPAZOTL</div>
      <div class="tile" data-position="SHAGAMBI" aria-label="Tile SHAGAMBI">SHAGAMBI</div>
      <div class="tile" data-position="OBOLAKA" aria-label="Tile OBOLAKA">OBOLAKA</div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
